name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar codigo do repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar o ambiente Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 3. Instalar dependencias
      run: npm install

    - name: 4. Executar os testes automatizados
      run: npm test