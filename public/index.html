<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas - DevOps IFCE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 25px;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add {
            background-color: #28a745;
            color: white;
        }
        .btn-add:hover {
            background-color: #218838;
        }
        .btn-check {
            background-color: #007bff;
            color: white;
            padding: 5px 10px;
            font-size: 14px;
        }
        .btn-check:hover {
            background-color: #0069d9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
        }
        .concluida {
            text-decoration: line-through;
            color: #888;
            font-style: italic;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-pendente {
            background-color: #ffeeba;
            color: #856404;
        }
        .badge-concluida {
            background-color: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Minhas Tarefas</h1>

    <!-- Formulário de Cadastro -->
    <div class="form-group">
        <input type="text" id="tituloTarefa" placeholder="Digite uma nova tarefa..." required>
        <button class="btn-add" onclick="cadastrarTarefa()">Adicionar</button>
    </div>

    <!-- Tabela de Listagem -->
    <table>
        <thead>
            <tr>
                <th>Tarefa</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaTarefas">
            <!-- Inserido dinamicamente via JS -->
        </tbody>
    </table>
</div>

<script>
    const API_URL = '/api/tarefas';

    // Carregar tarefas ao iniciar a página
    document.addEventListener('DOMContentLoaded', buscarTarefas);

    async function buscarTarefas() {
        try {
            const res = await fetch(API_URL);
            const tarefas = await res.json();
            const tbody = document.getElementById('listaTarefas');
            tbody.innerHTML = '';

            tarefas.forEach(tarefa => {
                const tr = document.createElement('tr');
                
                // Classe de riscado se estiver concluída
                const classeTitulo = tarefa.concluida ? 'concluida' : '';
                const badge = tarefa.concluida 
                    ? '<span class="status-badge badge-concluida">Concluída</span>' 
                    : '<span class="status-badge badge-pendente">Pendente</span>';
                
                // Botão de check só aparece se não estiver concluída
                const botaoAcao = tarefa.concluida 
                    ? '✓' 
                    : `<button class="btn-check" onclick="concluirTarefa(${tarefa.id})">✓</button>`;

                tr.innerHTML = `
                    <td class="${classeTitulo}">${tarefa.titulo}</td>
                    <td>${badge}</td>
                    <td>${botaoAcao}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('Erro ao buscar tarefas:', error);
        }
    }

    async function cadastrarTarefa() {
        const input = document.getElementById('tituloTarefa');
        const titulo = input.value.trim();
        
        if (!titulo) return alert('Digite um título para a tarefa!');

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo })
            });

            if (res.ok) {
                input.value = '';
                buscarTarefas();
            }
        } catch (error) {
            console.error('Erro ao cadastrar tarefa:', error);
        }
    }

    async function concluirTarefa(id) {
        try {
            const res = await fetch(`${API_URL}/${id}/concluir`, {
                method: 'PATCH'
            });

            if (res.ok) {
                buscarTarefas();
            } else {
                alert('Erro ao concluir a tarefa.');
            }
        } catch (error) {
            console.error('Erro ao concluir tarefa:', error);
        }
    }
</script>
</body>
</html>
